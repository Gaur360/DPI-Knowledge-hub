<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIG Knowledge Hub — ADB</title>

  <!-- ============================================================
    CONFIGURATION — update these two lines with your details
  ============================================================ -->
  <script>
    const GITHUB_OWNER = "Gaur360";  // e.g. "ritzgaur"
    const GITHUB_REPO  = "DPI-Knowledge-hub";      // your repo name
  </script>
  <!-- ============================================================ -->

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
      background: #fafaf8; color: #111; font-size: 14px; line-height: 1.5;
    }
    input, select, textarea, button {
      font-family: inherit; font-size: 13px;
      border: 1px solid #ddd; border-radius: 7px;
      padding: 6px 10px; background: #fff; color: #111; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: #999; }
    button { cursor: pointer; background: #fff; }
    a { color: inherit; text-decoration: none; }
    textarea { resize: vertical; }

    .header {
      background: #fff; border-bottom: 1px solid #eee;
      padding: 10px 20px; display: flex; align-items: center;
      gap: 10px; flex-wrap: wrap; position: sticky; top: 0; z-index: 10;
    }
    .logo-name { font-size: 14px; font-weight: 600; color: #111; }
    .logo-sub  { font-size: 10px; color: #aaa; margin-top: 1px; }
    .spacer    { flex: 1; }

    .btn-primary {
      background: #111; color: #fff; border: none;
      border-radius: 7px; padding: 6px 14px; font-size: 12px;
      display: flex; align-items: center; gap: 5px;
    }
    .btn-primary:hover { background: #333; }
    .btn-ghost {
      background: transparent; border: 1px solid #e0e0e0;
      border-radius: 7px; padding: 5px 11px; font-size: 12px;
      display: flex; align-items: center; gap: 5px; color: #555;
    }
    .btn-ghost:hover { background: #f5f5f3; }
    .btn-icon {
      background: transparent; border: none; padding: 5px;
      display: flex; align-items: center; color: #aaa;
    }
    .btn-icon:hover { color: #555; }

    .layout { display: flex; min-height: calc(100vh - 53px); }

    .sidebar {
      width: 200px; background: #fff; border-right: 1px solid #eee;
      padding: 12px 0; display: flex; flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-label {
      font-size: 9px; font-weight: 600; letter-spacing: 0.8px;
      color: #bbb; padding: 0 16px 8px; text-transform: uppercase;
    }
    .cat-btn {
      width: 100%; text-align: left; background: none; border: none;
      border-left: 2px solid transparent; padding: 7px 16px;
      font-size: 12px; color: #666; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      font-family: inherit;
    }
    .cat-btn:hover { background: #f5f5f3; color: #111; }
    .cat-btn.active {
      border-left-color: #111; background: #f5f5f3;
      color: #111; font-weight: 500;
    }
    .cat-count {
      font-size: 10px; background: #f0f0ed; color: #aaa;
      padding: 1px 6px; border-radius: 8px; min-width: 18px; text-align: center;
    }
    .sidebar-footer {
      margin-top: auto; padding: 14px 16px;
      border-top: 1px solid #eee;
    }
    .sidebar-total { font-size: 24px; font-weight: 600; color: #111; line-height: 1; }
    .sidebar-total-label { font-size: 11px; color: #aaa; margin-top: 3px; }
    .editor-badge {
      font-size: 10px; color: #1a6aba; margin-top: 7px;
      display: flex; align-items: center; gap: 4px;
    }

    .main { flex: 1; padding: 16px 22px; min-width: 0; }

    .filter-bar {
      background: #f5f5f3; border-radius: 8px;
      padding: 8px 12px; margin-bottom: 14px;
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .filter-bar label { font-size: 11px; color: #aaa; }
    .filter-bar select { font-size: 11px; padding: 3px 8px; }
    .clear-btn {
      font-size: 11px; color: #c0392b; background: none;
      border: none; cursor: pointer; font-family: inherit;
    }

    .cat-header { margin-bottom: 14px; }
    .cat-header h2 { font-size: 16px; font-weight: 500; color: #111; }
    .cat-header p  { font-size: 12px; color: #888; margin-top: 3px; }

    .results-count { font-size: 11px; color: #bbb; margin-bottom: 12px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }

    .card {
      background: #fff; border: 1px solid #eee; border-radius: 12px;
      padding: 12px 14px; display: flex; flex-direction: column; gap: 8px;
    }
    .card:hover { border-color: #ddd; }
    .card-top { display: flex; justify-content: space-between; align-items: center; }
    .cat-badge {
      font-size: 9px; font-weight: 600; letter-spacing: 0.4px;
      padding: 2px 8px; border-radius: 4px;
    }
    .delete-btn {
      background: none; border: none; cursor: pointer;
      color: #ccc; padding: 2px; display: flex;
    }
    .delete-btn:hover { color: #c0392b; }
    .card-title {
      font-size: 13px; font-weight: 500; color: #111; line-height: 1.4;
      display: flex; gap: 5px; align-items: flex-start;
    }
    .card-title:hover { color: #1a6aba; }
    .card-title span { flex: 1; }
    .card-desc { font-size: 12px; color: #666; line-height: 1.6; }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      font-size: 10px; background: #f5f5f3; color: #888;
      padding: 2px 7px; border-radius: 4px;
    }
    .card-meta {
      display: flex; gap: 6px; flex-wrap: wrap;
      border-top: 1px solid #f0f0ed; padding-top: 8px;
      font-size: 10px; color: #bbb;
    }

    .empty {
      padding: 60px 0; text-align: center; color: #bbb; font-size: 13px;
    }
    .empty-icon { font-size: 32px; opacity: 0.3; margin-bottom: 10px; }

    /* Error banner */
    .error-banner {
      background: #fdf0f0; border-bottom: 1px solid #f5c6c6;
      padding: 7px 20px; font-size: 12px; color: #c0392b;
      display: flex; align-items: center; gap: 8px;
    }
    .error-dismiss { margin-left: auto; background: none; border: none; cursor: pointer; color: #c0392b; font-family: inherit; font-size: 12px; }

    /* Token modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal {
      background: #fff; border-radius: 12px; border: 1px solid #e0e0e0;
      padding: 22px; width: 360px; position: relative;
    }
    .modal h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #111; }
    .modal p  { font-size: 12px; color: #666; line-height: 1.6; margin-bottom: 12px; }
    .modal input { width: 100%; margin-bottom: 12px; font-family: monospace; font-size: 12px; }
    .modal-close {
      position: absolute; top: 12px; right: 12px;
      background: none; border: none; cursor: pointer; color: #aaa; font-size: 18px; line-height: 1;
    }
    .modal-hint { font-size: 10px; color: #bbb; margin-top: 10px; line-height: 1.6; }
    .modal-hint code { background: #f5f5f3; padding: 1px 4px; border-radius: 3px; font-size: 10px; }

    /* Add form */
    .add-view { max-width: 560px; margin: 0 auto; padding: 20px; }
    .add-view h2 { font-size: 17px; font-weight: 600; margin-bottom: 4px; color: #111; }
    .add-view .subtitle { font-size: 12px; color: #888; margin-bottom: 20px; }
    .back-btn { font-size: 12px; color: #888; background: none; border: none; cursor: pointer; margin-bottom: 18px; font-family: inherit; }
    .back-btn:hover { color: #111; }
    .field { margin-bottom: 13px; }
    .field label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; }
    .field input, .field select, .field textarea { width: 100%; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 13px; }
    .form-error { font-size: 12px; color: #c0392b; background: #fdf0f0; padding: 7px 10px; border-radius: 7px; margin-bottom: 12px; }
    .form-actions { display: flex; gap: 8px; }

    /* Spinning refresh icon */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 1s linear infinite; }

    /* Search wrapper */
    .search-wrap { position: relative; display: flex; align-items: center; }
    .search-wrap svg { position: absolute; left: 9px; color: #bbb; pointer-events: none; }
    .search-wrap input { padding-left: 28px; width: 200px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── GitHub API helpers ──────────────────────────────────────
    const BRANCH   = "main";
    const DATA_FILE = "resources.json";
    const rawUrl  = () => `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${BRANCH}/${DATA_FILE}?t=${Date.now()}`;
    const apiUrl  = () => `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${DATA_FILE}`;

    async function loadResources() {
      const res = await fetch(rawUrl());
      if (!res.ok) throw new Error("Could not load resources from GitHub.");
      return res.json();
    }

    async function getFileSha(token) {
      const res = await fetch(apiUrl(), { headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.github+json" } });
      if (!res.ok) throw new Error("Could not reach GitHub. Check your token.");
      return (await res.json()).sha;
    }

    async function commitFile(token, data, sha) {
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
      const res = await fetch(apiUrl(), {
        method: "PUT",
        headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.github+json", "Content-Type": "application/json" },
        body: JSON.stringify({ message: `Update resources — ${new Date().toISOString().slice(0,10)}`, content, sha, branch: BRANCH }),
      });
      if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error(e?.message || "GitHub commit failed."); }
    }

    // ── Category config ─────────────────────────────────────────
    const CATS = [
      { id: "all",         label: "All Resources" },
      { id: "blueprints",  label: "Blueprint / Strategy" },
      { id: "dpi101",      label: "DPI 101" },
      { id: "dpiresearch", label: "DPI Research" },
      { id: "sectoral",    label: "Sectoral DPI" },
      { id: "digitalid",   label: "Digital Identity" },
      { id: "datasharing", label: "Data Sharing" },
    ];
    const CAT_COLORS = {
      blueprints:  { bg: "#E6F1FB", fg: "#0C447C" },
      dpi101:      { bg: "#EAF3DE", fg: "#27500A" },
      dpiresearch: { bg: "#FAEEDA", fg: "#633806" },
      sectoral:    { bg: "#E1F5EE", fg: "#085041" },
      digitalid:   { bg: "#EEEDFE", fg: "#3C3489" },
      datasharing: { bg: "#FAECE7", fg: "#712B13" },
    };
    const CAT_SHORT = { blueprints:"Blueprint", dpi101:"DPI 101", dpiresearch:"Research", sectoral:"Sectoral", digitalid:"Digital ID", datasharing:"Data Sharing" };
    const CAT_DESC  = {
      blueprints:  "National and multilateral strategies and frameworks for digital government transformation.",
      dpi101:      "Foundational papers, primers, and conceptual frameworks on DPI.",
      dpiresearch: "Academic and policy research on DPI outcomes, adoption, and impact.",
      sectoral:    "DPI applications in health, education, agriculture, GIS, and other sectors.",
      digitalid:   "Digital identity systems, vendors, DPGs, and technical standards.",
      datasharing: "Data exchange frameworks, consent architectures, and data portability tools.",
    };

    // ── SVG icons (inline, no library needed) ───────────────────
    const Icon = {
      Search:  () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
      Plus:    () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>,
      Link:    () => <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
      Trash:   () => <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>,
      Filter:  () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
      Refresh: () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
      Lock:    () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
      Unlock:  () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>,
      Key:     () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>,
      X:       () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    };

    // ── Token modal ──────────────────────────────────────────────
    function TokenModal({ current, onSave, onClose }) {
      const [val, setVal] = useState(current);
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={onClose}><Icon.X /></button>
            <h3 style={{display:"flex",alignItems:"center",gap:7}}><Icon.Key /> Editor access</h3>
            <p>
              Enter a GitHub Personal Access Token with <strong>Contents: Read &amp; Write</strong> permission on the <code style={{fontSize:11,background:"#f5f5f3",padding:"1px 5px",borderRadius:4}}>{GITHUB_REPO}</code> repo.
              Stored only in your browser — never sent anywhere except GitHub.
            </p>
            <input type="password" placeholder="github_pat_..." value={val} onChange={e => setVal(e.target.value)} onKeyDown={e => e.key==="Enter" && onSave(val.trim())} />
            <div style={{display:"flex",gap:8}}>
              <button className="btn-primary" onClick={() => onSave(val.trim())}>Save token</button>
              {current && <button onClick={() => onSave("")} style={{fontSize:12,color:"#c0392b",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Remove</button>}
            </div>
            <p className="modal-hint">
              Get one at: GitHub → Settings → Developer settings → Personal access tokens → Fine-grained tokens.<br/>
              Permission needed: <code>Contents</code> → Read and Write, on this repo only.
            </p>
          </div>
        </div>
      );
    }

    // ── Resource card ────────────────────────────────────────────
    function Card({ r, isEditor, onDelete }) {
      const col = CAT_COLORS[r.category] || { bg:"#f0f0ed", fg:"#555" };
      return (
        <div className="card">
          <div className="card-top">
            <span className="cat-badge" style={{background:col.bg,color:col.fg}}>{(CAT_SHORT[r.category]||r.category).toUpperCase()}</span>
            {isEditor && <button className="delete-btn" onClick={onDelete} title="Remove"><Icon.Trash /></button>}
          </div>
          <a href={r.url} target="_blank" rel="noopener noreferrer" className="card-title">
            <span>{r.title}</span><Icon.Link />
          </a>
          {r.description && <p className="card-desc">{r.description}</p>}
          {r.tags?.length > 0 && <div className="tags">{r.tags.map(t => <span key={t} className="tag">{t}</span>)}</div>}
          <div className="card-meta">
            {r.sourceOrg && <span>{r.sourceOrg}</span>}
            {r.country   && <span>· {r.country}</span>}
            {r.datePublished && <span>· {r.datePublished}</span>}
          </div>
        </div>
      );
    }

    // ── Add resource form ────────────────────────────────────────
    function AddView({ onBack, onAdd, saving }) {
      const empty = { title:"", url:"", description:"", category:"blueprints", tags:"", country:"", datePublished:"", sourceOrg:"" };
      const [form, setForm] = useState(empty);
      const [err, setErr]   = useState("");
      const set = (k,v) => { setForm(f=>({...f,[k]:v})); setErr(""); };
      const submit = () => {
        if (!form.title.trim()) { setErr("Title is required."); return; }
        if (!form.url.trim() || !form.url.startsWith("http")) { setErr("A valid URL starting with http is required."); return; }
        onAdd({ ...form, tags: form.tags.split(",").map(t=>t.trim()).filter(Boolean) });
      };
      const L = ({children}) => <label style={{display:"block",fontSize:11,color:"#888",marginBottom:4}}>{children}</label>;
      return (
        <div className="add-view">
          <button className="back-btn" onClick={onBack}>← Back to repository</button>
          <h2>Add a resource</h2>
          <p className="subtitle">Saves directly to the shared GitHub repository.</p>
          <div className="field"><L>Title *</L><input value={form.title} onChange={e=>set("title",e.target.value)} placeholder="e.g. India Stack: A Digital Infrastructure Story" /></div>
          <div className="field"><L>URL *</L><input value={form.url} onChange={e=>set("url",e.target.value)} placeholder="https://..." /></div>
          <div className="field"><L>Description</L><textarea rows={3} value={form.description} onChange={e=>set("description",e.target.value)} placeholder="Brief summary of the resource..." /></div>
          <div className="two-col">
            <div><L>Category *</L><select value={form.category} onChange={e=>set("category",e.target.value)}>
              <option value="blueprints">Blueprint / Strategy</option>
              <option value="dpi101">DPI 101</option>
              <option value="dpiresearch">DPI Research</option>
              <option value="sectoral">Sectoral DPI</option>
              <option value="digitalid">Digital Identity</option>
              <option value="datasharing">Data Sharing</option>
            </select></div>
            <div><L>Country / Region</L><input value={form.country} onChange={e=>set("country",e.target.value)} placeholder="e.g. India, Global" /></div>
          </div>
          <div className="two-col">
            <div><L>Source organization</L><input value={form.sourceOrg} onChange={e=>set("sourceOrg",e.target.value)} placeholder="e.g. World Bank ID4D" /></div>
            <div><L>Date published</L><input value={form.datePublished} onChange={e=>set("datePublished",e.target.value)} placeholder="e.g. 2024-03" /></div>
          </div>
          <div className="field"><L>Tags (comma-separated)</L><input value={form.tags} onChange={e=>set("tags",e.target.value)} placeholder="e.g. digital ID, biometrics, open source" /></div>
          {err && <div className="form-error">{err}</div>}
          <div className="form-actions">
            <button className="btn-primary" onClick={submit} disabled={saving} style={{opacity:saving?0.6:1}}>
              {saving ? "Saving..." : "Save resource"}
            </button>
            <button className="btn-ghost" onClick={onBack}>Cancel</button>
          </div>
        </div>
      );
    }

    // ── Main app ─────────────────────────────────────────────────
    function App() {
      const [resources, setResources] = useState([]);
      const [loading, setLoading]     = useState(true);
      const [syncing, setSyncing]     = useState(false);
      const [error, setError]         = useState("");
      const [view, setView]           = useState("browse");
      const [activeCat, setActiveCat] = useState("all");
      const [search, setSearch]       = useState("");
      const [showFilters, setShowFilters] = useState(false);
      const [fCountry, setFCountry]   = useState("");
      const [fSource, setFSource]     = useState("");
      const [fTag, setFTag]           = useState("");
      const [token, setToken]         = useState(() => localStorage.getItem("dig_pat") || "");
      const [showTokenModal, setShowTokenModal] = useState(false);
      const isEditor = Boolean(token);

      const load = useCallback(async () => {
        setLoading(true); setError("");
        try { setResources(await loadResources()); }
        catch(e) { setError(e.message); }
        setLoading(false);
      }, []);

      useEffect(() => { load(); }, [load]);

      function saveToken(t) {
        setToken(t);
        t ? localStorage.setItem("dig_pat", t) : localStorage.removeItem("dig_pat");
        setShowTokenModal(false);
      }

      async function handleAdd(resource) {
        setSyncing(true); setError("");
        try {
          const sha = await getFileSha(token);
          const updated = [{ ...resource, id: Date.now().toString(36), dateAdded: new Date().toISOString().slice(0,10) }, ...resources];
          await commitFile(token, updated, sha);
          setResources(updated);
        } catch(e) { setError(e.message); }
        setSyncing(false); setView("browse");
      }

      async function handleDelete(id) {
        if (!confirm("Remove this resource?")) return;
        setSyncing(true); setError("");
        try {
          const sha = await getFileSha(token);
          const updated = resources.filter(r => r.id !== id);
          await commitFile(token, updated, sha);
          setResources(updated);
        } catch(e) { setError(e.message); }
        setSyncing(false);
      }

      const filtered = resources.filter(r => {
        if (activeCat !== "all" && r.category !== activeCat) return false;
        if (search) {
          const q = search.toLowerCase();
          if (![r.title, r.description, ...(r.tags||[]), r.sourceOrg, r.country].join(" ").toLowerCase().includes(q)) return false;
        }
        if (fCountry && r.country !== fCountry) return false;
        if (fSource  && r.sourceOrg !== fSource) return false;
        if (fTag     && !(r.tags||[]).includes(fTag)) return false;
        return true;
      });

      const counts      = Object.fromEntries(CATS.map(c => [c.id, c.id==="all" ? resources.length : resources.filter(r=>r.category===c.id).length]));
      const allCountries = [...new Set(resources.map(r=>r.country).filter(Boolean))].sort();
      const allSources   = [...new Set(resources.map(r=>r.sourceOrg).filter(Boolean))].sort();
      const allTags      = [...new Set(resources.flatMap(r=>r.tags||[]))].sort();
      const activeFilters = [fCountry, fSource, fTag].filter(Boolean).length;

      if (view === "add") return <AddView onBack={()=>setView("browse")} onAdd={handleAdd} saving={syncing} />;

      return (
        <>
          <header className="header">
            <div>
              <div className="logo-name">DPI Knowledge Hub</div>
            <div class="logo-sub"></div>
            </div>
            <div className="spacer" />
            <div className="search-wrap">
              <Icon.Search />
              <input placeholder="Search resources..." value={search} onChange={e=>setSearch(e.target.value)} />
            </div>
            <button className="btn-ghost" onClick={()=>setShowFilters(v=>!v)} style={{position:"relative",background:showFilters?"#f0f0ed":"#fff"}}>
              <Icon.Filter /> Filters
              {activeFilters > 0 && <span style={{position:"absolute",top:2,right:2,width:6,height:6,borderRadius:"50%",background:"#185FA5"}}/>}
            </button>
            <button className="btn-icon" onClick={load} title="Refresh">
              <span className={loading||syncing?"spinning":""}><Icon.Refresh /></span>
            </button>
            <button className="btn-icon" onClick={()=>setShowTokenModal(true)} title={isEditor?"Editor mode on — click to manage token":"Unlock editor access"} style={{color:isEditor?"#185FA5":"#bbb"}}>
              {isEditor ? <Icon.Unlock /> : <Icon.Lock />}
            </button>
            {isEditor && (
              <button className="btn-primary" onClick={()=>setView("add")}>
                <Icon.Plus /> Add resource
              </button>
            )}
          </header>

          {error && (
            <div className="error-banner">
              ⚠ {error}
              <button className="error-dismiss" onClick={()=>setError("")}>Dismiss</button>
            </div>
          )}

          <div className="layout">
            <aside className="sidebar">
              <div className="sidebar-label">Categories</div>
              {CATS.map(cat => (
                <button key={cat.id} className={`cat-btn${activeCat===cat.id?" active":""}`} onClick={()=>setActiveCat(cat.id)}>
                  <span>{cat.label}</span>
                  <span className="cat-count">{counts[cat.id]}</span>
                </button>
              ))}
              <div className="sidebar-footer">
                <div className="sidebar-total">{resources.length}</div>
                <div className="sidebar-total-label">resources indexed</div>
                {isEditor && <div className="editor-badge"><Icon.Unlock /> editor mode</div>}
              </div>
            </aside>

            <main className="main">
              {showFilters && (
                <div className="filter-bar">
                  <label>Filter by</label>
                  <select value={fCountry} onChange={e=>setFCountry(e.target.value)}>
                    <option value="">All countries</option>
                    {allCountries.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                  <select value={fSource} onChange={e=>setFSource(e.target.value)}>
                    <option value="">All sources</option>
                    {allSources.map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                  <select value={fTag} onChange={e=>setFTag(e.target.value)}>
                    <option value="">All tags</option>
                    {allTags.map(t=><option key={t} value={t}>{t}</option>)}
                  </select>
                  {activeFilters > 0 && <button className="clear-btn" onClick={()=>{setFCountry("");setFSource("");setFTag("");}}>Clear filters</button>}
                </div>
              )}

              {activeCat !== "all" && (
                <div className="cat-header">
                  <h2>{CATS.find(c=>c.id===activeCat)?.label}</h2>
                  <p>{CAT_DESC[activeCat]}</p>
                </div>
              )}

              {loading ? (
                <div className="empty"><div className="empty-icon">⟳</div>Loading resources...</div>
              ) : (
                <>
                  <div className="results-count">
                    {filtered.length} resource{filtered.length!==1?"s":""}
                    {search && ` · matching "${search}"`}
                  </div>
                  {filtered.length === 0 ? (
                    <div className="empty">
                      <div className="empty-icon">○</div>
                      No resources found. Try a different search or filter.
                    </div>
                  ) : (
                    <div className="grid">
                      {filtered.map(r => <Card key={r.id} r={r} isEditor={isEditor} onDelete={()=>handleDelete(r.id)} />)}
                    </div>
                  )}
                </>
              )}
            </main>
          </div>

          {showTokenModal && <TokenModal current={token} onSave={saveToken} onClose={()=>setShowTokenModal(false)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
