<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DPI Knowledge Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <script>
    const GITHUB_OWNER = "Gaur360";
    const GITHUB_REPO  = "DPI-Knowledge-hub";
    // Once you deploy to Vercel, replace this with your Vercel URL:
    // e.g. "https://dpi-knowledge-hub.vercel.app/api/chat"
   const AI_PROXY_URL = "https://dpi-knowledge-hub-b2tq.vercel.app/api/chat";
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg:         #F4F2ED;
      --surface:    #FFFFFF;
      --surface-2:  #F9F8F5;
      --border:     #E2DED5;
      --border-mid: #C8C4B8;
      --navy:       #1B3A5C;
      --navy-mid:   #2E5C8A;
      --navy-light: #EAF0F7;
      --navy-dark:  #122640;
      --text:       #18181A;
      --text-2:     #56544E;
      --text-3:     #9A9890;
      --red:        #B83232;
      --gold:       #C4882A;
      --serif:      'Lora', Georgia, serif;
      --sans:       'DM Sans', -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: var(--sans); }
    textarea { resize: vertical; font-family: var(--sans); }
    input, select, textarea {
      font-family: var(--sans); font-size: 13px;
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 11px; background: var(--surface); color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--navy-mid); }

    /* ── Header ── */
    .header {
      background: var(--navy-dark);
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .logo { display: flex; align-items: baseline; gap: 10px; }
    .logo-name {
      font-family: var(--serif);
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.3px;
      line-height: 1;
    }
    .logo-tag {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.5px;
      font-weight: 400;
    }
    .spacer { flex: 1; }

    .search-wrap { position: relative; display: flex; align-items: center; }
    .search-wrap svg { position: absolute; left: 10px; color: rgba(255,255,255,0.4); pointer-events: none; }
    .search-wrap input {
      padding-left: 32px; width: 200px;
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.15);
      color: #fff; font-size: 12.5px;
      transition: width 0.2s, background 0.15s;
    }
    .search-wrap input::placeholder { color: rgba(255,255,255,0.4); }
    .search-wrap input:focus { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.35); width: 240px; }

    .btn-primary {
      background: #fff; color: var(--navy-dark); border: none;
      border-radius: 6px; padding: 7px 14px; font-size: 12.5px;
      font-weight: 500; display: flex; align-items: center; gap: 6px;
      transition: background 0.15s; white-space: nowrap;
    }
    .btn-primary:hover { background: #e8f0f8; }
    .btn-ghost-dark {
      background: transparent; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px; padding: 6px 12px; font-size: 12px;
      color: rgba(255,255,255,0.7); display: flex; align-items: center;
      gap: 5px; transition: border-color 0.15s, background 0.15s; white-space: nowrap;
    }
    .btn-ghost-dark:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); }
    .btn-icon-dark {
      background: transparent; border: none; padding: 6px;
      display: flex; align-items: center; color: rgba(255,255,255,0.5);
      border-radius: 5px; transition: color 0.15s, background 0.15s;
    }
    .btn-icon-dark:hover { color: #fff; background: rgba(255,255,255,0.1); }

    /* ── Layout ── */
    .layout { display: flex; min-height: calc(100vh - 56px); }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 22px 0 0;
      display: flex; flex-direction: column; flex-shrink: 0;
      position: sticky; top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
    }
    .sidebar-label {
      font-size: 9px; font-weight: 500; letter-spacing: 1.4px;
      color: var(--text-3); padding: 0 18px 10px; text-transform: uppercase;
    }
    .cat-btn {
      width: 100%; text-align: left; background: none; border: none;
      border-left: 2px solid transparent; padding: 8px 18px;
      font-size: 12.5px; font-weight: 400; color: var(--text-2);
      cursor: pointer; display: flex; justify-content: space-between;
      align-items: center; transition: background 0.1s, color 0.1s; line-height: 1.4;
    }
    .cat-btn:hover { background: var(--bg); color: var(--text); }
    .cat-btn.active {
      border-left-color: var(--navy); color: var(--navy);
      font-weight: 500; background: var(--navy-light);
    }
    .cat-count {
      font-size: 10px; color: var(--text-3); background: var(--bg);
      padding: 1px 7px; border-radius: 10px; min-width: 22px; text-align: center;
    }
    .cat-btn.active .cat-count { background: #D0DFF0; color: var(--navy-mid); }

    .sidebar-divider { height: 1px; background: var(--border); margin: 12px 0; }
    .sidebar-action-btn {
      width: 100%; font-size: 11.5px; padding: 7px 18px;
      border: none; background: transparent; color: var(--text-2);
      cursor: pointer; display: flex; align-items: center; gap: 7px;
      transition: background 0.1s, color 0.1s; text-align: left;
    }
    .sidebar-action-btn:hover { background: var(--bg); color: var(--text); }

    .sidebar-footer {
      margin-top: auto; padding: 16px 18px 22px;
      border-top: 1px solid var(--border);
    }
    .sidebar-stat { font-family: var(--serif); font-size: 28px; color: var(--navy); line-height: 1; font-weight: 600; }
    .sidebar-stat-label { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .editor-badge { font-size: 10px; color: var(--navy-mid); margin-top: 8px; display: flex; align-items: center; gap: 4px; }

    /* ── Mobile pills ── */
    .mobile-cat-bar {
      display: none; background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto; padding: 10px 16px; gap: 6px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .mobile-cat-bar::-webkit-scrollbar { display: none; }
    .mobile-cat-pill {
      flex-shrink: 0; padding: 5px 13px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface);
      font-size: 12px; color: var(--text-2); cursor: pointer;
      white-space: nowrap; transition: all 0.15s;
    }
    .mobile-cat-pill.active { background: var(--navy); color: #fff; border-color: var(--navy); font-weight: 500; }
    .mobile-cat-pill:hover:not(.active) { border-color: var(--border-mid); background: var(--bg); }

    /* ── Main ── */
    .main { flex: 1; min-width: 0; }

    /* ── Hub hero ── */
    .hub-hero {
      background: var(--navy-dark);
      padding: 36px 36px 30px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }
    .hub-hero::before {
      content: "";
      position: absolute;
      top: -60px; right: -60px;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(46,92,138,0.4) 0%, transparent 70%);
      pointer-events: none;
    }
    .hub-hero-eyebrow {
      font-size: 10px; font-weight: 500; letter-spacing: 1.2px;
      color: rgba(255,255,255,0.4); text-transform: uppercase;
      margin-bottom: 10px;
    }
    .hub-hero-title {
      font-family: var(--serif);
      font-size: 22px; font-weight: 600;
      color: #ffffff; letter-spacing: -0.4px;
      line-height: 1.3; margin-bottom: 10px;
      max-width: 480px;
    }
    .hub-hero-desc {
      font-size: 13px; color: rgba(255,255,255,0.55);
      line-height: 1.7; max-width: 520px;
    }
    .hub-stats {
      display: flex; align-items: center; gap: 20px;
      margin-top: 22px; flex-wrap: wrap;
    }
    .hub-stat { display: flex; flex-direction: column; gap: 2px; }
    .hub-stat-num {
      font-family: var(--serif); font-size: 22px; font-weight: 600;
      color: #ffffff; line-height: 1;
    }
    .hub-stat-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.3px; }
    .hub-stat-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.12); }

    /* ── Category header ── */
    .cat-header {
      padding: 26px 36px 22px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .cat-header-eyebrow {
      font-size: 10px; font-weight: 500; letter-spacing: 1px;
      color: var(--text-3); text-transform: uppercase; margin-bottom: 6px;
    }
    .cat-header-title {
      font-family: var(--serif); font-size: 20px; font-weight: 600;
      color: var(--navy); letter-spacing: -0.3px; margin-bottom: 8px;
    }
    .cat-header-desc { font-size: 13px; color: var(--text-2); line-height: 1.7; max-width: 540px; }
    .cat-header-count { margin-top: 12px; font-size: 11px; color: var(--text-3); }

    /* ── Content ── */
    .content { padding: 22px 36px 60px; }

    .filter-bar {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 14px; margin-bottom: 20px;
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .filter-bar span { font-size: 11px; color: var(--text-3); }
    .filter-bar select { font-size: 11.5px; padding: 4px 8px; background: var(--bg); border-color: transparent; }
    .clear-btn { font-size: 11px; color: var(--red); background: none; border: none; cursor: pointer; margin-left: auto; }
    .results-count { font-size: 11.5px; color: var(--text-3); margin-bottom: 16px; }

    /* ── Grid ── */
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px 20px;
      display: flex; flex-direction: column;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }
    .card:hover {
      border-color: var(--border-mid);
      box-shadow: 0 4px 20px rgba(27,58,92,0.08);
      transform: translateY(-1px);
    }
    .card-top {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 12px; gap: 6px;
    }
    .card-badges { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .cat-badge {
      font-size: 9px; font-weight: 600; letter-spacing: 0.8px;
      padding: 3px 8px; border-radius: 3px; text-transform: uppercase;
    }
    .type-badge {
      font-size: 9px; font-weight: 400; letter-spacing: 0.3px;
      padding: 3px 7px; border-radius: 3px;
      background: var(--bg); color: var(--text-3);
      border: 1px solid var(--border); text-transform: uppercase;
    }
    .card-actions { opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
    .card:hover .card-actions { opacity: 1; }
    .delete-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-3); padding: 3px; display: flex; border-radius: 4px;
    }
    .delete-btn:hover { color: var(--red); background: #FEF2F2; }

    .card-title {
      font-family: var(--serif); font-size: 14.5px; font-weight: 500;
      color: var(--text); line-height: 1.45; margin-bottom: 9px;
      display: flex; gap: 6px; align-items: flex-start;
    }
    .card-title a { flex: 1; transition: color 0.15s; }
    .card-title a:hover { color: var(--navy); }
    .card-link-icon {
      flex-shrink: 0; margin-top: 3px; color: var(--text-3);
      opacity: 0; transition: opacity 0.15s;
    }
    .card:hover .card-link-icon { opacity: 1; }

    .card-desc {
      font-size: 12.5px; color: var(--text-2); line-height: 1.65;
      margin-bottom: 14px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border); padding-top: 11px; margin-top: auto;
    }
    .card-meta { display: flex; gap: 5px; font-size: 11px; color: var(--text-3); flex-wrap: wrap; align-items: center; }
    .card-meta-dot { color: var(--border-mid); }
    .card-tag-count {
      font-size: 10px; color: var(--text-3); background: var(--bg);
      border: 1px solid var(--border); padding: 2px 7px;
      border-radius: 10px; white-space: nowrap;
    }

    /* ── Empty ── */
    .empty { padding: 80px 0; text-align: center; color: var(--text-3); }
    .empty-rule { width: 32px; height: 2px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .empty p { font-size: 13px; }
    .empty small { font-size: 11.5px; margin-top: 6px; display: block; }

    /* ── Error ── */
    .error-banner {
      background: #FEF2F2; border-bottom: 1px solid #FECACA;
      padding: 8px 28px; font-size: 12px; color: var(--red);
      display: flex; align-items: center; gap: 8px;
    }
    .error-dismiss { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--red); font-size: 12px; }

    /* ── Modals ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(10,15,25,0.45);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100; padding: 0; backdrop-filter: blur(3px);
    }
    .modal {
      background: var(--surface); border-radius: 20px 20px 0 0;
      border: 1px solid var(--border); padding: 26px 26px 36px;
      width: 100%; max-width: 500px; position: relative;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 -4px 30px rgba(10,15,25,0.12);
    }
    .modal-title {
      font-family: var(--serif); font-size: 18px; font-weight: 600;
      color: var(--navy); margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px; letter-spacing: -0.2px;
    }
    .modal p { font-size: 12.5px; color: var(--text-2); line-height: 1.65; margin-bottom: 16px; }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none; cursor: pointer;
      color: var(--text-3); display: flex; border-radius: 4px; padding: 3px;
    }
    .modal-close:hover { color: var(--text); background: var(--bg); }
    .modal-hint { font-size: 10.5px; color: var(--text-3); margin-top: 12px; line-height: 1.6; }
    .modal-hint code { background: var(--bg); padding: 1px 5px; border-radius: 3px; font-size: 10px; border: 1px solid var(--border); }
    .form-field { margin-bottom: 13px; }
    .form-field label { display: block; font-size: 11px; font-weight: 500; color: var(--text-2); margin-bottom: 5px; }
    .form-field input, .form-field select, .form-field textarea { width: 100%; }
    .form-error-msg { font-size: 12px; color: var(--red); background: #FEF2F2; padding: 9px 12px; border-radius: 6px; margin-bottom: 12px; border: 1px solid #FECACA; }
    .form-actions { display: flex; gap: 8px; margin-top: 4px; }

    /* ── Add view ── */
    .add-view { max-width: 560px; margin: 0 auto; padding: 30px 36px 60px; }
    .add-view-title { font-family: var(--serif); font-size: 22px; font-weight: 600; color: var(--navy); margin-bottom: 5px; letter-spacing: -0.3px; }
    .add-view-sub { font-size: 12.5px; color: var(--text-2); margin-bottom: 26px; }
    .back-btn { font-size: 12px; color: var(--text-3); background: none; border: none; cursor: pointer; margin-bottom: 24px; display: flex; align-items: center; gap: 5px; padding: 0; }
    .back-btn:hover { color: var(--text); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .suggest-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .suggest-row span { font-size: 11px; font-weight: 500; color: var(--text-2); }
    .suggest-btn { font-size: 11px; padding: 4px 11px; border-radius: 5px; border: 1px solid #B8D4EC; background: #EEF4FB; color: var(--navy-mid); cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .suggest-btn:hover { background: #DCE9F5; }
    .suggest-btn:disabled { opacity: 0.5; cursor: wait; }

    /* ── AI Panel ── */
    .ai-fab {
      position: fixed; bottom: 28px; right: 28px; z-index: 50;
      width: 50px; height: 50px; border-radius: 50%;
      background: var(--navy-dark); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(27,58,92,0.35);
      transition: background 0.15s, transform 0.15s;
    }
    .ai-fab:hover { background: var(--navy); transform: scale(1.06); }
    .ai-backdrop { display: none; position: fixed; inset: 0; background: rgba(10,15,25,0.25); z-index: 59; }
    .ai-window {
      position: fixed; bottom: 28px; right: 28px;
      width: 420px; z-index: 60;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(10,15,25,0.18);
      display: flex; flex-direction: column;
      height: 580px;
      animation: slideUp 0.22s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .ai-header {
      padding: 16px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: flex-start; justify-content: space-between;
      background: var(--navy-dark); border-radius: 16px 16px 0 0;
      flex-shrink: 0;
    }
    .ai-header-name { font-family: var(--serif); font-size: 15px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 7px; }
    .ai-header-sub { font-size: 10.5px; color: rgba(255,255,255,0.45); margin-top: 3px; }
    .ai-header-close { background: rgba(255,255,255,0.1); border: none; cursor: pointer; color: rgba(255,255,255,0.7); display: flex; padding: 5px; border-radius: 6px; }
    .ai-header-close:hover { background: rgba(255,255,255,0.2); color: #fff; }
    .ai-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      background: var(--surface-2);
    }
    .ai-msg { max-width: 85%; font-size: 13px; line-height: 1.7; padding: 11px 15px; border-radius: 12px; }
    .ai-msg.user { background: var(--navy); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .ai-msg.assistant { background: var(--surface); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    .ai-msg.thinking { color: var(--text-3); font-style: italic; background: var(--surface); border: 1px solid var(--border); }
    .ai-empty { font-size: 12.5px; color: var(--text-3); text-align: center; padding: 28px 20px; line-height: 1.75; }
    .ai-empty strong { display: block; color: var(--text-2); font-weight: 500; margin-bottom: 6px; font-size: 14px; }
    .ai-input-row { padding: 12px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--surface); border-radius: 0 0 16px 16px; flex-shrink: 0; }
    .ai-input-row input { flex: 1; font-size: 13px; background: var(--bg); border-color: transparent; }
    .ai-input-row input:focus { background: var(--surface); border-color: var(--navy-mid); }
    .ai-send { background: var(--navy); color: #fff; border: none; border-radius: 7px; padding: 7px 14px; font-size: 12px; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 5px; }
    .ai-send:hover { background: var(--navy-mid); }
    .ai-send:disabled { opacity: 0.4; cursor: wait; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 1s linear infinite; }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      .ai-backdrop.open { display: block; }
      .header { padding: 0 14px; gap: 8px; }
      .logo-name { font-size: 14px; }
      .logo-tag { display: none; }
      .search-wrap input { width: 130px; }
      .search-wrap input:focus { width: 150px; }
      .filter-label { display: none; }
      .sidebar { display: none; }
      .mobile-cat-bar { display: flex; }
      .layout { display: block; }
      .main { width: 100%; }
      .hub-hero { padding: 22px 18px 20px; }
      .hub-hero::before { display: none; }
      .hub-hero-title { font-size: 18px; }
      .hub-hero-desc { font-size: 12.5px; }
      .hub-stats { gap: 16px; margin-top: 18px; }
      .hub-stat-num { font-size: 18px; }
      .cat-header { padding: 18px 18px 16px; }
      .cat-header-title { font-size: 17px; }
      .cat-header-desc { font-size: 12.5px; }
      .content { padding: 14px 14px 50px; }
      .grid { grid-template-columns: 1fr; gap: 10px; }
      .card-actions { opacity: 1; }
      .card-link-icon { opacity: 1; }
      .card { padding: 14px 15px; }
      .card-title { font-size: 13.5px; }
      .card-desc { font-size: 12px; }
      .filter-bar { flex-direction: column; align-items: flex-start; gap: 8px; }
      .filter-bar select { width: 100%; }
      .clear-btn { margin-left: 0; }
      .add-view { padding: 20px 16px 50px; }
      .two-col { grid-template-columns: 1fr; }
      .modal { border-radius: 20px 20px 0 0; padding: 22px 18px 36px; }
      .ai-fab { bottom: 18px; right: 18px; width: 48px; height: 48px; }
      .ai-backdrop.open { display: block; }
      .ai-window {
        bottom: 0; right: 0; left: 0; width: 100%;
        height: 72vh;
        border-radius: 20px 20px 0 0;
      }
    }

    /* ── Tablet ── */
    @media (min-width: 681px) and (max-width: 960px) {
      .sidebar { width: 185px; }
      .grid { grid-template-columns: 1fr; }
      .hub-hero, .cat-header { padding-left: 26px; padding-right: 26px; }
      .content { padding-left: 26px; padding-right: 26px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const BRANCH = "main";
    const DATA_FILE = "resources.json";
    const rawUrl = () => `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${BRANCH}/${DATA_FILE}?t=${Date.now()}`;
    const apiUrl = () => `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${DATA_FILE}`;

    async function loadResources() {
      const res = await fetch(rawUrl());
      if (!res.ok) throw new Error("Could not load resources from GitHub.");
      return res.json();
    }
    async function getFileSha(token) {
      const res = await fetch(apiUrl(), { headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.github+json" } });
      if (!res.ok) throw new Error("Could not reach GitHub. Check your token.");
      return (await res.json()).sha;
    }
    async function commitFile(token, data, sha) {
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
      const res = await fetch(apiUrl(), {
        method: "PUT",
        headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.github+json", "Content-Type": "application/json" },
        body: JSON.stringify({ message: `Update resources — ${new Date().toISOString().slice(0,10)}`, content, sha, branch: BRANCH }),
      });
      if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error(e?.message || "GitHub commit failed."); }
    }

    async function askAI(messages, context) {
      const res = await fetch(AI_PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages, context }),
      });
      if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error(e?.error || "AI unavailable"); }
      return (await res.json()).reply;
    }

    function renderMarkdown(text) {
      return text
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
        .replace(/\*(.+?)\*/g,"<em>$1</em>")
        .replace(/^### (.+)$/gm,"<div style='font-family:var(--serif);font-size:13px;font-weight:600;color:var(--navy);margin:10px 0 4px;'>$1</div>")
        .replace(/^## (.+)$/gm,"<div style='font-family:var(--serif);font-size:14px;font-weight:600;color:var(--navy);margin:12px 0 5px;'>$1</div>")
        .replace(/^[-•] (.+)$/gm,"<div style='display:flex;gap:7px;margin:3px 0;'><span style='color:var(--navy-mid);flex-shrink:0;'>·</span><span>$1</span></div>")
        .replace(/\n\n/g,"<div style='height:7px'></div>")
        .replace(/\n/g,"<br/>");
    }

    const CATS = [
      { id: "all",         label: "All Resources" },
      { id: "blueprints",  label: "Frameworks & Strategy" },
      { id: "dpi101",      label: "DPI 101" },
      { id: "dpiresearch", label: "DPI Research" },
      { id: "sectoral",    label: "Sectoral Applications" },
      { id: "digitalid",   label: "Digital Identity" },
      { id: "payments",    label: "Payments / FinTech" },
      { id: "datasharing", label: "Data Sharing" },
    ];
    const CAT_COLORS = {
      blueprints:  { bg: "#E8EFF8", fg: "#1B3A5C" },
      dpi101:      { bg: "#EAF3DE", fg: "#2D5A1B" },
      dpiresearch: { bg: "#FDF3E3", fg: "#7A4A0A" },
      sectoral:    { bg: "#E4F4EE", fg: "#1A5C42" },
      digitalid:   { bg: "#EEE8F8", fg: "#4A2A8C" },
      payments:    { bg: "#FAEAE4", fg: "#8C2A1A" },
      datasharing: { bg: "#F0EEE8", fg: "#4A4438" },
    };
    const CAT_SHORT = {
      blueprints:"Framework", dpi101:"DPI 101", dpiresearch:"Research",
      sectoral:"Sectoral", digitalid:"Digital ID", payments:"Payments", datasharing:"Data Sharing",
    };
    const CAT_DESC = {
      blueprints:  "Overarching national and multilateral strategies for building digital government — whole-of-government blueprints, G20 declarations, and platform frameworks that shape how countries approach digital transformation.",
      dpi101:      "Starting-point readings on Digital Public Infrastructure — what it is, why it matters, and how to think about it. Ideal for onboarding colleagues or briefing new stakeholders.",
      dpiresearch: "Empirical and policy research on DPI outcomes — impact studies, financing models, evidence from country deployments, and academic work on adoption and governance.",
      sectoral:    "DPI applied to specific domains: health, education, agriculture, climate, and GIS. Resources that explore how identity, payments, and data exchange reshape service delivery in each sector.",
      digitalid:   "Everything on foundational digital identity — legislation, technical standards, vendor landscape, DPGs like MOSIP, regulatory toolkits, and practitioner guides for designing inclusive ID systems.",
      payments:    "Digital payments infrastructure and FinTech DPI — instant payment systems, interoperability frameworks, open banking, and the policy layer enabling inclusive digital finance.",
      datasharing: "Data exchange architectures, consent frameworks, and data portability — from India's DEPA and Account Aggregator model to Estonia's X-Road and emerging data governance regimes.",
    };
    const RESOURCE_TYPES = [
      "Article","Research Paper","Report","Case Study",
      "Practitioner Guide","Legislation","Strategy","Explainer",
      "Platform / Tool","Dataset","Declaration","Working Paper","Book",
    ];

    const Icon = {
      Search:  () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
      Plus:    () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>,
      Link:    () => <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
      Trash:   () => <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>,
      Filter:  () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
      Refresh: () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
      Lock:    () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
      Unlock:  () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>,
      Key:     () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>,
      X:       () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      Back:    () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>,
      Sparkle: () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z"/></svg>,
      Send:    () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
    };

    function TokenModal({ current, onSave, onClose }) {
      const [val, setVal] = useState(current);
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <button className="modal-close" onClick={onClose}><Icon.X /></button>
            <div className="modal-title"><Icon.Key /> Editor access</div>
            <p>Enter a GitHub Personal Access Token with <strong>Contents: Read &amp; Write</strong> on the <code style={{fontSize:11,background:"#f0ede6",padding:"1px 5px",borderRadius:3}}>{GITHUB_REPO}</code> repo. Stored only in your browser.</p>
            <input type="password" placeholder="github_pat_..." value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onSave(val.trim())} style={{width:"100%",marginBottom:14,fontFamily:"monospace",fontSize:12}} />
            <div className="form-actions">
              <button className="btn-primary" style={{background:"var(--navy)",color:"#fff"}} onClick={()=>onSave(val.trim())}>Save token</button>
              {current && <button onClick={()=>onSave("")} style={{fontSize:12,color:"#B83232",background:"none",border:"none",cursor:"pointer"}}>Remove</button>}
            </div>
            <p className="modal-hint">GitHub → Settings → Developer settings → Fine-grained tokens. Set Contents → Read and Write.</p>
          </div>
        </div>
      );
    }

    function AiPanel({ resources }) {
      const [open, setOpen] = useState(false);
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [thinking, setThinking] = useState(false);
      const bottomRef = useRef(null);
      useEffect(() => { bottomRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages, thinking]);

      async function send() {
        if (!input.trim()||thinking) return;
        const userMsg = input.trim(); setInput("");
        const newMsgs = [...messages, {role:"user",content:userMsg}];
        setMessages(newMsgs); setThinking(true);
        try {
          const context = resources.map(r=>`[${r.title}] (${r.category}${r.resourceType?", "+r.resourceType:""}) — ${r.description||""} — ${r.url}`).join("\n");
          const reply = await askAI(newMsgs, context);
          setMessages([...newMsgs, {role:"assistant",content:reply}]);
        } catch(e) {
          setMessages([...newMsgs, {role:"assistant",content:`Sorry, the AI assistant isn't available right now. (${e.message})`}]);
        }
        setThinking(false);
      }

      return (
        <>
          {open && <div className="ai-backdrop open" onClick={()=>setOpen(false)} />}
          {open && (
            <div className="ai-window">
              <div className="ai-header">
                <div>
                  <div className="ai-header-name">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z"/></svg>
                    Ask the library
                  </div>
                  <div className="ai-header-sub">Powered by Claude · {resources.length} resources</div>
                </div>
                <button className="ai-header-close" onClick={()=>setOpen(false)}><Icon.X /></button>
              </div>
              <div className="ai-messages">
                {messages.length===0 && (
                  <div className="ai-empty">
                    <strong>Ask anything about DPI</strong>
                    Which resources cover digital payments? What do the G20 frameworks say about data sharing? Which papers are from Southeast Asia?
                  </div>
                )}
                {messages.map((m,i)=>(
                  <div key={i} className={`ai-msg ${m.role}`}>
                    {m.role==="assistant"
                      ? <span dangerouslySetInnerHTML={{__html:renderMarkdown(m.content)}} />
                      : m.content}
                  </div>
                ))}
                {thinking && <div className="ai-msg thinking">Thinking...</div>}
                <div ref={bottomRef} />
              </div>
              <div className="ai-input-row">
                <input placeholder="Ask a question..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} />
                <button className="ai-send" onClick={send} disabled={thinking||!input.trim()}><Icon.Send /> Send</button>
              </div>
            </div>
          )}
          <button className="ai-fab" onClick={()=>setOpen(v=>!v)} title="Ask the library">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.8"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z"/></svg>
          </button>
        </>
      );
    }

    function Card({ r, isEditor, onDelete }) {
      const col = CAT_COLORS[r.category] || { bg:"#F0EEE8", fg:"#4A4438" };
      const label = CAT_SHORT[r.category] || r.category;
      const tagCount = r.tags?.length || 0;
      return (
        <div className="card">
          <div className="card-top">
            <div className="card-badges">
              <span className="cat-badge" style={{background:col.bg,color:col.fg}}>{label.toUpperCase()}</span>
              {r.resourceType && <span className="type-badge">{r.resourceType}</span>}
            </div>
            <div className="card-actions">
              {isEditor && <button className="delete-btn" onClick={onDelete}><Icon.Trash /></button>}
            </div>
          </div>
          <div className="card-title">
            <a href={r.url} target="_blank" rel="noopener noreferrer">{r.title}</a>
            <span className="card-link-icon"><Icon.Link /></span>
          </div>
          {r.description && <p className="card-desc">{r.description}</p>}
          <div className="card-footer">
            <div className="card-meta">
              {r.sourceOrg && <span>{r.sourceOrg}</span>}
              {r.country && <><span className="card-meta-dot">·</span><span>{r.country}</span></>}
              {r.datePublished && <><span className="card-meta-dot">·</span><span>{r.datePublished}</span></>}
            </div>
            {tagCount > 0 && <span className="card-tag-count">{tagCount} tag{tagCount!==1?"s":""}</span>}
          </div>
        </div>
      );
    }

    function AddView({ onBack, onAdd, saving }) {
      const empty = { title:"", url:"", description:"", category:"blueprints", resourceType:"", tags:"", country:"", datePublished:"", sourceOrg:"" };
      const [form, setForm] = useState(empty);
      const [err, setErr] = useState("");
      const set = (k,v) => { setForm(f=>({...f,[k]:v})); setErr(""); };

      function submit() {
        if (!form.title.trim()) { setErr("Title is required."); return; }
        if (!form.url.trim()||!form.url.startsWith("http")) { setErr("A valid URL is required."); return; }
        onAdd({ ...form, tags: form.tags.split(",").map(t=>t.trim()).filter(Boolean) });
      }

      return (
        <div className="add-view">
          <button className="back-btn" onClick={onBack}><Icon.Back /> Back</button>
          <div className="add-view-title">Add a resource</div>
          <p className="add-view-sub">Saves directly to the shared GitHub repository.</p>
          <div className="form-field"><label>Title *</label><input value={form.title} onChange={e=>set("title",e.target.value)} placeholder="e.g. India Stack: A Digital Infrastructure Story" /></div>
          <div className="form-field"><label>URL *</label><input value={form.url} onChange={e=>set("url",e.target.value)} placeholder="https://..." /></div>
          <div className="form-field"><label>Description</label><textarea rows={3} value={form.description} onChange={e=>set("description",e.target.value)} placeholder="Brief summary — 2-3 sentences." /></div>
          <div className="two-col" style={{marginBottom:13}}>
            <div className="form-field" style={{marginBottom:0}}><label>Category *</label>
              <select value={form.category} onChange={e=>set("category",e.target.value)} style={{width:"100%"}}>
                <option value="blueprints">Frameworks & Strategy</option>
                <option value="dpi101">DPI 101</option>
                <option value="dpiresearch">DPI Research</option>
                <option value="sectoral">Sectoral Applications</option>
                <option value="digitalid">Digital Identity</option>
                <option value="payments">Payments / FinTech</option>
                <option value="datasharing">Data Sharing</option>
              </select>
            </div>
            <div className="form-field" style={{marginBottom:0}}><label>Resource type</label>
              <select value={form.resourceType} onChange={e=>set("resourceType",e.target.value)} style={{width:"100%"}}>
                <option value="">Select type...</option>
                {RESOURCE_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
          </div>
          <div className="two-col" style={{marginBottom:13}}>
            <div className="form-field" style={{marginBottom:0}}><label>Source org</label><input value={form.sourceOrg} onChange={e=>set("sourceOrg",e.target.value)} placeholder="e.g. World Bank" /></div>
            <div className="form-field" style={{marginBottom:0}}><label>Country / Region</label><input value={form.country} onChange={e=>set("country",e.target.value)} placeholder="e.g. India, Global" /></div>
          </div>
          <div className="two-col" style={{marginBottom:13}}>
            <div className="form-field" style={{marginBottom:0}}><label>Date published</label><input value={form.datePublished} onChange={e=>set("datePublished",e.target.value)} placeholder="e.g. 2024-03" /></div>
          </div>
          <div className="form-field"><label>Tags (comma-separated)</label><input value={form.tags} onChange={e=>set("tags",e.target.value)} placeholder="e.g. digital ID, biometrics, open source" /></div>
          {err && <div className="form-error-msg">{err}</div>}
          <div className="form-actions">
            <button onClick={submit} disabled={saving} style={{flex:1,justifyContent:"center",background:"var(--navy)",color:"#fff",border:"none",borderRadius:"6px",padding:"9px 16px",fontSize:"13px",fontWeight:500,cursor:saving?"wait":"pointer",opacity:saving?0.6:1,display:"flex",alignItems:"center",gap:6,fontFamily:"var(--sans)"}}>
              {saving?"Saving...":"Save resource"}
            </button>
            <button onClick={onBack} style={{padding:"9px 16px",fontSize:"13px",background:"transparent",border:"1px solid var(--border)",borderRadius:"6px",color:"var(--text-2)"}}>Cancel</button>
          </div>
        </div>
      );
    }

    function App() {
      const [resources, setResources] = useState([]);
      const [loading, setLoading]     = useState(true);
      const [syncing, setSyncing]     = useState(false);
      const [error, setError]         = useState("");
      const [view, setView]           = useState("browse");
      const [activeCat, setActiveCat] = useState("all");
      const [search, setSearch]       = useState("");
      const [showFilters, setShowFilters] = useState(false);
      const [fCountry, setFCountry]   = useState("");
      const [fSource, setFSource]     = useState("");
      const [fType, setFType]         = useState("");
      const [token, setToken]         = useState(()=>localStorage.getItem("dig_pat")||"");
      const [showTokenModal, setShowTokenModal] = useState(false);
      const isEditor = Boolean(token);

      const load = useCallback(async () => {
        setLoading(true); setError("");
        try { setResources(await loadResources()); }
        catch(e) { setError(e.message); }
        setLoading(false);
      }, []);
      useEffect(()=>{ load(); },[load]);

      function saveToken(t) { setToken(t); t?localStorage.setItem("dig_pat",t):localStorage.removeItem("dig_pat"); setShowTokenModal(false); }

      async function handleAdd(resource) {
        setSyncing(true); setError("");
        try {
          const sha = await getFileSha(token);
          const updated = [{...resource, id:Date.now().toString(36), dateAdded:new Date().toISOString().slice(0,10)}, ...resources];
          await commitFile(token, updated, sha);
          setResources(updated);
        } catch(e) { setError(e.message); }
        setSyncing(false); setView("browse");
      }

      async function handleDelete(id) {
        if (!confirm("Remove this resource?")) return;
        setSyncing(true); setError("");
        try {
          const sha = await getFileSha(token);
          const updated = resources.filter(r=>r.id!==id);
          await commitFile(token, updated, sha);
          setResources(updated);
        } catch(e) { setError(e.message); }
        setSyncing(false);
      }

      const filtered = resources.filter(r => {
        if (activeCat!=="all"&&r.category!==activeCat) return false;
        if (search) { const q=search.toLowerCase(); if(![r.title,r.description,...(r.tags||[]),r.sourceOrg,r.country,r.resourceType||""].join(" ").toLowerCase().includes(q)) return false; }
        if (fCountry&&r.country!==fCountry) return false;
        if (fSource&&r.sourceOrg!==fSource) return false;
        if (fType&&r.resourceType!==fType) return false;
        return true;
      });

      const counts       = Object.fromEntries(CATS.map(c=>[c.id,c.id==="all"?resources.length:resources.filter(r=>r.category===c.id).length]));
      const allCountries = [...new Set(resources.map(r=>r.country).filter(Boolean))].sort();
      const allSources   = [...new Set(resources.map(r=>r.sourceOrg).filter(Boolean))].sort();
      const allTypes     = [...new Set(resources.map(r=>r.resourceType).filter(Boolean))].sort();
      const activeFilters = [fCountry,fSource,fType].filter(Boolean).length;

      if (view==="add") return <AddView onBack={()=>setView("browse")} onAdd={handleAdd} saving={syncing} />;

      const catInfo = CATS.find(c=>c.id===activeCat);

      return (
        <>
          <header className="header">
            <div className="logo">
              <div className="logo-name">DPI Knowledge Hub</div>
            </div>
            <div className="spacer" />
            <div className="search-wrap">
              <Icon.Search />
              <input placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} />
            </div>
            <button className="btn-ghost-dark" onClick={()=>setShowFilters(v=>!v)} style={{position:"relative"}}>
              <Icon.Filter />
              <span className="filter-label"> Filters</span>
              {activeFilters>0&&<span style={{position:"absolute",top:3,right:3,width:5,height:5,borderRadius:"50%",background:"#C4882A"}}/>}
            </button>
            <button className="btn-icon-dark" onClick={load} title="Refresh">
              <span className={(loading||syncing)?"spinning":""}><Icon.Refresh /></span>
            </button>
            <button className="btn-icon-dark" onClick={()=>setShowTokenModal(true)} style={{color:isEditor?"#7BB8E8":"rgba(255,255,255,0.4)"}} title={isEditor?"Editor mode on":"Unlock editing"}>
              {isEditor?<Icon.Unlock />:<Icon.Lock />}
            </button>
            {isEditor && (
              <button className="btn-primary" onClick={()=>setView("add")}>
                <Icon.Plus /><span className="filter-label"> Add</span>
              </button>
            )}
          </header>

          {error && <div className="error-banner">⚠ {error}<button className="error-dismiss" onClick={()=>setError("")}>Dismiss</button></div>}

          <div className="mobile-cat-bar">
            {CATS.map(cat=>(
              <button key={cat.id} className={`mobile-cat-pill${activeCat===cat.id?" active":""}`} onClick={()=>setActiveCat(cat.id)}>
                {cat.label} {counts[cat.id]>0&&<span style={{opacity:0.6,marginLeft:3}}>{counts[cat.id]}</span>}
              </button>
            ))}
          </div>

          <div className="layout">
            <aside className="sidebar">
              <div className="sidebar-label">Categories</div>
              {CATS.map(cat=>(
                <button key={cat.id} className={`cat-btn${activeCat===cat.id?" active":""}`} onClick={()=>setActiveCat(cat.id)}>
                  <span>{cat.label}</span>
                  <span className="cat-count">{counts[cat.id]}</span>
                </button>
              ))}
              <div className="sidebar-footer">
                <div className="sidebar-stat">{resources.length}</div>
                <div className="sidebar-stat-label">resources indexed</div>
                {isEditor && <div className="editor-badge"><Icon.Unlock /> editor mode</div>}
              </div>
            </aside>

            <main className="main">
              {activeCat==="all" && (
                <div className="hub-hero">
                  <div className="hub-hero-eyebrow">DPI Knowledge Hub</div>
                  <div className="hub-hero-title">A curated library on Digital Public Infrastructure</div>
                  <p className="hub-hero-desc">A living reference for practitioners working on DPI. Browse frameworks, foundational readings, research, and sector-specific resources — or search by topic, country, or organisation.</p>
                  <div className="hub-stats">
                    <div className="hub-stat"><div className="hub-stat-num">{resources.length}</div><div className="hub-stat-label">Resources</div></div>
                    <div className="hub-stat-divider" />
                    <div className="hub-stat"><div className="hub-stat-num">{CATS.length-1}</div><div className="hub-stat-label">Categories</div></div>
                    <div className="hub-stat-divider" />
                    <div className="hub-stat"><div className="hub-stat-num">{[...new Set(resources.map(r=>r.country).filter(Boolean))].length}</div><div className="hub-stat-label">Countries</div></div>
                    <div className="hub-stat-divider" />
                    <div className="hub-stat"><div className="hub-stat-num">{[...new Set(resources.map(r=>r.sourceOrg).filter(Boolean))].length}</div><div className="hub-stat-label">Organisations</div></div>
                  </div>
                </div>
              )}

              {activeCat!=="all" && catInfo && (
                <div className="cat-header">
                  <div className="cat-header-eyebrow">Category</div>
                  <div className="cat-header-title">{catInfo.label}</div>
                  <p className="cat-header-desc">{CAT_DESC[activeCat]}</p>
                  <div className="cat-header-count">{counts[activeCat]} resource{counts[activeCat]!==1?"s":""}</div>
                </div>
              )}

              <div className="content">
                {showFilters && (
                  <div className="filter-bar">
                    <span>Filter by</span>
                    <select value={fCountry} onChange={e=>setFCountry(e.target.value)}>
                      <option value="">All countries</option>
                      {allCountries.map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                    <select value={fSource} onChange={e=>setFSource(e.target.value)}>
                      <option value="">All sources</option>
                      {allSources.map(s=><option key={s} value={s}>{s}</option>)}
                    </select>
                    <select value={fType} onChange={e=>setFType(e.target.value)}>
                      <option value="">All types</option>
                      {allTypes.map(t=><option key={t} value={t}>{t}</option>)}
                    </select>
                    {activeFilters>0&&<button className="clear-btn" onClick={()=>{setFCountry("");setFSource("");setFType("");}}>Clear filters</button>}
                  </div>
                )}

                {search && <div className="results-count">{filtered.length} result{filtered.length!==1?"s":""} matching "{search}"</div>}

                {loading ? (
                  <div className="empty"><div className="empty-rule"/><p>Loading resources...</p></div>
                ) : filtered.length===0 ? (
                  <div className="empty"><div className="empty-rule"/><p>No resources found.</p><small>Try adjusting your search or filters.</small></div>
                ) : (
                  <div className="grid">
                    {filtered.map(r=><Card key={r.id} r={r} isEditor={isEditor} onDelete={()=>handleDelete(r.id)} />)}
                  </div>
                )}
              </div>
            </main>
          </div>

          <AiPanel resources={resources} />
          {showTokenModal && <TokenModal current={token} onSave={saveToken} onClose={()=>setShowTokenModal(false)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
